server:
  port: 8081

spring:
  application:
    name: flashchat-chat-service

  # ==================== 数据源 ====================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/flashchat?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 5000
      pool-name: FlashChatHikariPool

  # ==================== Redis ====================
  data:
    redis:
      host: 127.0.0.1
      port: 6379

# ==================== MyBatis-Plus ====================
mybatis-plus:
  global-config:
    db-config:
      # 逻辑删除字段值
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键策略：自增
      id-type: auto
    # 关闭 banner
    banner: false
  configuration:
    # 驼峰映射（avatar_color → avatarColor）
    map-underscore-to-camel-case: true
    # 开发阶段打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

flashchat:
  cache:
    redis:
      value-timeout: 60000
      value-time-unit: MILLISECONDS
