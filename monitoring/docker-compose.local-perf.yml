services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: flashchat-prometheus-local-perf
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus-local-perf.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_local_perf_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: flashchat-grafana-local-perf
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=flashchat123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_local_perf_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_local_perf_data:
  grafana_local_perf_data:
